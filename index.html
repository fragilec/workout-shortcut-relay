<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'none'; connect-src 'none'; base-uri 'none'; form-action 'none'">
  <title>训练休息倒计时</title>
  <style>
    :root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f5;color:#242424}
    main{width:min(88vw,420px);text-align:center;background:white;padding:32px 24px;border-radius:20px;box-shadow:0 10px 36px #0001}
    h1{font-size:24px;margin:0 0 12px}.time{font-size:64px;font-variant-numeric:tabular-nums;font-weight:800;margin:16px 0}p{line-height:1.6;color:#666}
    a{display:block;margin-top:24px;padding:16px;border-radius:12px;background:#2383e2;color:white;text-decoration:none;font-weight:700}
    .error{color:#c33}@media(prefers-color-scheme:dark){body{background:#191919;color:#eee}main{background:#252525}p{color:#aaa}}
  </style>
</head>
<body>
  <main>
    <h1 id="title">休息倒计时</h1>
    <div id="time" class="time">--</div>
    <p id="message">倒计时结束后自动进入下一组。</p>
    <a id="open" href="#">立即进入下一组</a>
  </main>
  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const seconds = params.get("s");
      const next = params.get("u");
      const validSeconds = /^(?:0|[1-9]\d{0,3})$/.test(seconds || "") && Number(seconds) <= 3600;
      let validNext = false;
      try {
        const url = new URL(next || "");
        validNext = url.protocol === "https:" &&
          (url.hostname === "app.notion.com" || url.hostname === "www.notion.so" || url.hostname.endsWith(".notion.site"));
      } catch {}
      if (!validSeconds || !validNext) {
        document.querySelector("#title").textContent = "链接参数无效";
        document.querySelector("#time").hidden = true;
        document.querySelector("#message").textContent = "请从 Notion 训练页面重新打开。";
        document.querySelector("#message").className = "error";
        document.querySelector("#open").hidden = true;
        return;
      }
      const button = document.querySelector("#open");
      const display = document.querySelector("#time");
      button.href = next;
      let remaining = Number(seconds);
      const render = () => {
        const minutes = Math.floor(remaining / 60);
        const secs = String(remaining % 60).padStart(2, "0");
        display.textContent = minutes + ":" + secs;
      };
      render();
      const timer = setInterval(() => {
        remaining -= 1;
        render();
        if (remaining <= 0) {
          clearInterval(timer);
          document.querySelector("#title").textContent = "休息结束";
          document.querySelector("#message").textContent = "正在进入下一组…";
          location.replace(next);
        }
      }, 1000);
    })();
  </script>
</body>
</html>
